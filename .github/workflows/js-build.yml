name: JS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

jobs:
  build-js:
    name: Build JS bundles
    runs-on: ubuntu-latest
    env:
      TURBO_CACHE_DIR: .turbo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-js-build-${{ github.ref_name }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'packages/**/tsconfig.json', 'packages/**/src/**', 'scripts/**', 'src/**', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-turbo-js-build-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-js-build-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate node registries
        run: bun run generate:node-registries

      - name: Build package JS
        run: bun run build:packages:turbo

      - name: Typecheck app
        run: bun run typecheck

      - name: Build frontend JS
        run: bunx vite build

      - name: Build backend JS
        run: bun run build:backend:js

      - name: Upload JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiranite-js-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            dist/**
            build/wails/xiranite-backend.js
