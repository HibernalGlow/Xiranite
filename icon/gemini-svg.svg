<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <pattern id="bgGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#d0e8dd" stroke-width="1"/>
    </pattern>
    <pattern id="darkGrid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <pattern id="lightGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="rgba(140,240,164,0.5)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 背景底色与网格 -->
  <rect width="100%" height="100%" fill="#e3f2ec"/>
  <rect width="100%" height="100%" fill="url(#bgGrid)"/>

  <!-- 四角 L 型定位标 -->
  <g fill="none">
    <!-- 左上 -->
    <path d="M 50,110 L 50,50 L 110,50" stroke="#8ab396" stroke-width="4"/>
    <path d="M 65,125 L 65,65 L 125,65" stroke="#c4eb73" stroke-width="2"/>
    <!-- 右上 -->
    <path d="M 750,110 L 750,50 L 690,50" stroke="#8ab396" stroke-width="4"/>
    <path d="M 735,125 L 735,65 L 675,65" stroke="#c4eb73" stroke-width="2"/>
    <!-- 左下 -->
    <path d="M 50,690 L 50,750 L 110,750" stroke="#8ab396" stroke-width="4"/>
    <path d="M 65,675 L 65,735 L 125,735" stroke="#c4eb73" stroke-width="2"/>
    <!-- 右下 -->
    <path d="M 750,690 L 750,750 L 690,750" stroke="#8ab396" stroke-width="4"/>
    <path d="M 735,675 L 735,735 L 675,735" stroke="#c4eb73" stroke-width="2"/>
  </g>

  <!-- 1. 底层半透明绿色装饰条 -->
  <rect x="120" y="240" width="380" height="60" fill="#75e8a5" opacity="0.6" rx="4"/>
  <rect x="640" y="120" width="50" height="320" fill="#75e8a5" opacity="0.5" rx="4"/>

  <!-- 2. 中央雷达框 -->
  <rect x="180" y="180" width="480" height="480" fill="#75e8a5" opacity="0.15" stroke="#5ee896" stroke-width="3"/>

  <!-- 3. 黑色装甲主体 -->
  <!-- 左侧长竖条 -->
  <rect x="250" y="120" width="80" height="580" fill="#2a2d2a" rx="4"/>
  <!-- 右侧长竖条 -->
  <rect x="580" y="220" width="70" height="520" fill="#2a2d2a" rx="4"/>
  <!-- 偏上横条 -->
  <rect x="180" y="360" width="420" height="50" fill="#2a2d2a" rx="4"/>
  <!-- 底部粗横条 -->
  <rect x="80" y="520" width="620" height="70" fill="#2a2d2a" rx="4"/>
  <!-- 顶部横条 (带暗色网格) -->
  <rect x="200" y="150" width="460" height="70" fill="#2a2d2a" rx="4"/>
  <rect x="200" y="150" width="460" height="70" fill="url(#darkGrid)" rx="4"/>
  <!-- 前景悬浮黑块 -->
  <rect x="320" y="500" width="330" height="100" fill="#2a2d2a" rx="4" opacity="0.95"/>

  <!-- 4. 左侧竖条亮色网格覆盖 -->
  <rect x="250" y="280" width="80" height="220" fill="url(#lightGrid)"/>

  <!-- 5. 前景毛玻璃 -->
  <rect x="680" y="460" width="120" height="60" fill="#75e8a5" opacity="0.5" rx="4"/>
  <rect x="520" y="490" width="90" height="130" fill="#75e8a5" opacity="0.4" rx="4"/>

  <!-- 6. 白色切角高光 -->
  <g fill="#fff">
    <!-- 左下双层切角 -->
    <path d="M 250,660 L 280,690 L 250,690 Z"/>
    <path d="M 250,680 L 270,700 L 250,700 Z" opacity="0.5"/>
    <!-- 右上切角 -->
    <path d="M 620,220 L 650,220 L 620,250 Z"/>
    <!-- 右下切角 -->
    <path d="M 650,710 L 620,740 L 650,740 Z"/>
  </g>

  <!-- 7. 黄绿色点缀细节 -->
  <g fill="#c4eb73">
    <!-- 左下角点阵 -->
    <rect x="100" y="545" width="10" height="10" rx="2"/>
    <rect x="200" y="545" width="8" height="8"/>
    <rect x="215" y="545" width="8" height="8"/>
    <rect x="200" y="560" width="8" height="8"/>
    <rect x="215" y="560" width="8" height="8"/>
    <!-- 右上方块 -->
    <rect x="655" y="140" width="20" height="15" rx="2"/>
  </g>

  <!-- 右下方框准星 -->
  <rect x="590" y="610" width="20" height="20" fill="none" stroke="#c4eb73" stroke-width="2"/>
  <rect x="595" y="615" width="10" height="10" fill="#c4eb73"/>

  <!-- 中央十字准星 -->
  <path d="M 340,510 L 340,650" stroke="#c4eb73" stroke-width="2"/>
  <path d="M 320,630 L 360,630" stroke="#c4eb73" stroke-width="2"/>

  <!-- 底部刻度排线 -->
  <g stroke="#777" stroke-width="3">
    <path d="M 394,640 L 394,680"/>
    <path d="M 414,640 L 414,680"/>
    <path d="M 434,640 L 434,680"/>
    <path d="M 454,640 L 454,680"/>
  </g>

  <!-- 右侧边缘指示器 -->
  <path d="M 720,480 L 720,500" stroke="#c4eb73" stroke-width="2"/>
  <path d="M 700,490 L 740,490" stroke="#c4eb73" stroke-width="2"/>
  <circle cx="720" cy="490" r="4" fill="#c4eb73"/>
</svg>
