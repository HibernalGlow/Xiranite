name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    env:
      TURBO_CACHE_DIR: .turbo
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~\.bun\install\cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-windows-release-${{ github.ref_name }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'packages/**/tsconfig.json', 'packages/**/src/**', 'scripts/**', 'src/**', 'vite.config.ts', 'go.mod', 'go.sum', '*.go', 'build/windows/**') }}
          restore-keys: |
            ${{ runner.os }}-turbo-windows-release-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-windows-release-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate node registries
        run: bun run generate:node-registries

      - name: Build node packages
        run: bun run build:nodes

      - name: Build packages
        run: bun run build:packages:turbo

      - name: Typecheck app
        run: bun run typecheck:app

      - name: Build frontend
        run: bunx vite build

      - name: Build backend JS
        run: bun run build:backend:js

      - name: Prepare embedded native assets
        run: bun run build:native-assets

      - name: Generate Windows resources
        run: bun run wails:syso

      - name: Build Windows EXE
        run: go build -mod=mod -tags production -ldflags="-w -s -H windowsgui" -o build/wails/Xiranite.exe .

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiranite-${{ github.ref_name }}-windows-x64
          if-no-files-found: error
          path: build/wails/Xiranite.exe

      - name: Publish GitHub Release asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Xiranite $tag" --notes "Automated Windows release for $tag"
          }
          gh release upload $tag build/wails/Xiranite.exe --clobber
